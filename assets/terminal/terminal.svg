<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">

  <!-- Window background -->
  <rect width="800" height="400" rx="10" ry="10" fill="#161b22"/>
  <rect x="0.5" y="0.5" width="799" height="399" rx="10" ry="10"
        fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar background -->
  <rect x="0" y="0" width="800" height="40" rx="10" ry="10" fill="#1c2128"/>
  <rect x="0" y="20" width="800" height="20" fill="#1c2128"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#30363d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="12" fill="#8b949e">patrick@rekozzz — bash</text>

  <!-- ── Static terminal content ── -->

  <!-- Line 1: whoami command -->
  <text x="24" y="76"
        font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan fill="#58a6ff">patrick@rekozzz</tspan><tspan fill="#e6edf3">:~$ whoami</tspan>
  </text>
  <!-- Line 2: output -->
  <text x="24" y="98"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">Patrick Shehata</text>

  <!-- Line 3: role command -->
  <text x="24" y="130"
        font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan fill="#58a6ff">patrick@rekozzz</tspan><tspan fill="#e6edf3">:~$ role</tspan>
  </text>
  <!-- Line 4: output -->
  <text x="24" y="152"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">Backend Engineer</text>

  <!-- Line 5: interests command -->
  <text x="24" y="184"
        font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan fill="#58a6ff">patrick@rekozzz</tspan><tspan fill="#e6edf3">:~$ interests</tspan>
  </text>
  <!-- Lines 6-8: output -->
  <text x="24" y="206"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">Distributed Systems</text>
  <text x="24" y="226"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">System Design</text>
  <text x="24" y="246"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">Software Architecture</text>

  <!-- Line 9: status command -->
  <text x="24" y="278"
        font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan fill="#58a6ff">patrick@rekozzz</tspan><tspan fill="#e6edf3">:~$ status</tspan>
  </text>
  <!-- Line 10: output -->
  <text x="24" y="300"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#8b949e">Building...</text>

  <!-- ── Blinking cursor — ONLY animation in the file ── -->
  <text x="24" y="330"
        font-family="'Courier New', Courier, monospace" font-size="14"
        fill="#58a6ff">█<animate
      attributeName="opacity"
      values="1;0;1"
      dur="1.2s"
      repeatCount="indefinite"
      calcMode="discrete"/></text>

</svg>
