<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="Consolas, 'Courier New', monospace" font-size="14">
  <defs>
    <!-- Command Clip Paths -->
    <clipPath id="c1"><rect x="180" y="50" width="0" height="25"><animate attributeName="width" values="0; 0; 60; 60; 0" keyTimes="0; 0.031; 0.062; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="c2"><rect x="180" y="106" width="0" height="25"><animate attributeName="width" values="0; 0; 40; 40; 0" keyTimes="0; 0.187; 0.218; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="c3"><rect x="180" y="162" width="0" height="25"><animate attributeName="width" values="0; 0; 80; 80; 0" keyTimes="0; 0.375; 0.406; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="c4"><rect x="180" y="258" width="0" height="25"><animate attributeName="width" values="0; 0; 80; 80; 0" keyTimes="0; 0.562; 0.593; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="c5"><rect x="180" y="314" width="0" height="25"><animate attributeName="width" values="0; 0; 60; 60; 0" keyTimes="0; 0.750; 0.781; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>

    <!-- Output Clip Paths -->
    <clipPath id="o1"><rect x="20" y="80" width="0" height="20"><animate attributeName="width" values="0; 0; 140; 140; 0" keyTimes="0; 0.075; 0.106; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="o2"><rect x="20" y="136" width="0" height="20"><animate attributeName="width" values="0; 0; 230; 230; 0" keyTimes="0; 0.231; 0.293; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="o3"><rect x="20" y="192" width="0" height="70"><animate attributeName="width" values="0; 0; 200; 200; 0" keyTimes="0; 0.418; 0.481; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="o4"><rect x="20" y="288" width="0" height="20"><animate attributeName="width" values="0; 0; 480; 480; 0" keyTimes="0; 0.606; 0.668; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
    <clipPath id="o5"><rect x="20" y="344" width="0" height="20"><animate attributeName="width" values="0; 0; 250; 250; 0" keyTimes="0; 0.793; 0.856; 0.968; 1" dur="16s" repeatCount="indefinite" /></rect></clipPath>
  </defs>

  <!-- Window Frame -->
  <rect width="800" height="380" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect width="800" height="40" rx="10" ry="10" fill="#161b22"/>
  <rect y="20" width="800" height="20" fill="#161b22"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#30363d" stroke-width="1"/>
  
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="400" y="25" text-anchor="middle" fill="#8b949e" font-size="12">patrick@rekozzz — bash</text>

  <g font-size="14">
    <!-- Block 1 -->
    <g opacity="0">
      <animate attributeName="opacity" values="1;1;1;0" keyTimes="0;0.01;0.968;1" dur="16s" repeatCount="indefinite" />
      <text x="20" y="70" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="70" fill="#e6edf3">:~$</text>
      <g clip-path="url(#c1)">
        <text x="180" y="70" fill="#f0f6fc">whoami</text>
      </g>
    </g>
    <g clip-path="url(#o1)">
      <text x="20" y="94" fill="#8b949e">Patrick Shehata</text>
    </g>

    <!-- Block 2 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.156;0.968;1" dur="16s" repeatCount="indefinite" />
      <text x="20" y="126" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="126" fill="#e6edf3">:~$</text>
      <g clip-path="url(#c2)">
        <text x="180" y="126" fill="#f0f6fc">role</text>
      </g>
    </g>
    <g clip-path="url(#o2)">
      <text x="20" y="150" fill="#8b949e">Backend Software Engineer</text>
    </g>

    <!-- Block 3 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.343;0.968;1" dur="16s" repeatCount="indefinite" />
      <text x="20" y="182" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="182" fill="#e6edf3">:~$</text>
      <g clip-path="url(#c3)">
        <text x="180" y="182" fill="#f0f6fc">interests</text>
      </g>
    </g>
    <g clip-path="url(#o3)">
      <text x="20" y="206" fill="#8b949e">Distributed Systems</text>
      <text x="20" y="226" fill="#8b949e">System Design</text>
      <text x="20" y="246" fill="#8b949e">Software Architecture</text>
    </g>

    <!-- Block 4 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.531;0.968;1" dur="16s" repeatCount="indefinite" />
      <text x="20" y="278" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="278" fill="#e6edf3">:~$</text>
      <g clip-path="url(#c4)">
        <text x="180" y="278" fill="#f0f6fc">currently</text>
      </g>
    </g>
    <g clip-path="url(#o4)">
      <text x="20" y="302" fill="#8b949e">Building scalable systems with NestJS and PostgreSQL...</text>
    </g>

    <!-- Block 5 -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.718;0.968;1" dur="16s" repeatCount="indefinite" />
      <text x="20" y="334" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="334" fill="#e6edf3">:~$</text>
      <g clip-path="url(#c5)">
        <text x="180" y="334" fill="#f0f6fc">status</text>
      </g>
    </g>
    <g clip-path="url(#o5)">
      <text x="20" y="358" fill="#8b949e">Ready for the next challenge</text>
    </g>

    <!-- Cursor at the end -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.856;0.968;1" dur="16s" repeatCount="indefinite" />
      <rect x="260" y="346" width="8" height="15" fill="#f0f6fc">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </g>
  </g>
</svg>
