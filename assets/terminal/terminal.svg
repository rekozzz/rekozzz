<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="Consolas, 'Courier New', monospace" font-size="14">
  <defs>
    <!-- Typing clip paths using standard native SVG animate -->
    <clipPath id="c1">
      <rect x="180" y="50" width="0" height="25">
        <animate attributeName="width" values="0; 60; 60; 0" keyTimes="0; 0.08; 0.95; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="c2">
      <rect x="180" y="106" width="0" height="25">
        <animate attributeName="width" values="0; 0; 40; 40; 0" keyTimes="0; 0.16; 0.20; 0.95; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="c3">
      <rect x="180" y="162" width="0" height="25">
        <animate attributeName="width" values="0; 0; 80; 80; 0" keyTimes="0; 0.29; 0.33; 0.95; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="c4">
      <rect x="180" y="258" width="0" height="25">
        <animate attributeName="width" values="0; 0; 80; 80; 0" keyTimes="0; 0.45; 0.50; 0.95; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
    <clipPath id="c5">
      <rect x="180" y="314" width="0" height="25">
        <animate attributeName="width" values="0; 0; 60; 60; 0" keyTimes="0; 0.62; 0.66; 0.95; 1" dur="12s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <!-- Window Frame -->
  <rect width="800" height="380" rx="10" ry="10" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect width="800" height="40" rx="10" ry="10" fill="#161b22"/>
  <rect y="20" width="800" height="20" fill="#161b22"/>
  <line x1="0" y1="40" x2="800" y2="40" stroke="#30363d" stroke-width="1"/>
  
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="20" r="6" fill="#27c93f"/>
  <text x="400" y="25" text-anchor="middle" fill="#8b949e" font-size="12">patrick@rekozzz — bash</text>

  <g font-size="14">
    <!-- whoami -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.01;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="70" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="70" fill="#e6edf3">:~$</text>
    </g>
    <g clip-path="url(#c1)">
      <text x="180" y="70" fill="#f0f6fc">whoami</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="94" fill="#8b949e">Patrick Shehata</text>
    </g>

    <!-- role -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.16;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="126" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="126" fill="#e6edf3">:~$</text>
    </g>
    <g clip-path="url(#c2)">
      <text x="180" y="126" fill="#f0f6fc">role</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.22;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="150" fill="#8b949e">Backend Software Engineer</text>
    </g>

    <!-- interests -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.29;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="182" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="182" fill="#e6edf3">:~$</text>
    </g>
    <g clip-path="url(#c3)">
      <text x="180" y="182" fill="#f0f6fc">interests</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.35;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="206" fill="#8b949e">Distributed Systems</text>
      <text x="20" y="226" fill="#8b949e">System Design</text>
      <text x="20" y="246" fill="#8b949e">Software Architecture</text>
    </g>

    <!-- currently -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.45;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="278" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="278" fill="#e6edf3">:~$</text>
    </g>
    <g clip-path="url(#c4)">
      <text x="180" y="278" fill="#f0f6fc">currently</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.51;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="302" fill="#8b949e">Building scalable systems with NestJS and PostgreSQL...</text>
    </g>

    <!-- status -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.62;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="334" fill="#58a6ff">patrick@rekozzz</text>
      <text x="145" y="334" fill="#e6edf3">:~$</text>
    </g>
    <g clip-path="url(#c5)">
      <text x="180" y="334" fill="#f0f6fc">status</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.68;0.95;1" dur="12s" repeatCount="indefinite" />
      <text x="20" y="358" fill="#8b949e">Ready for the next challenge</text>
    </g>

    <!-- Cursor -->
    <g>
      <animate attributeName="opacity" values="1;0" keyTimes="0;0.95" dur="12s" repeatCount="indefinite" calcMode="discrete"/>
      <rect width="8" height="16" fill="#f0f6fc">
        <animate attributeName="x" values="180; 231; 231; 180; 214; 214; 180; 256; 256; 180; 256; 256; 180; 231; 231; 180" keyTimes="0; 0.08; 0.16; 0.161; 0.2; 0.29; 0.291; 0.33; 0.45; 0.451; 0.5; 0.62; 0.621; 0.66; 0.95; 1" dur="12s" repeatCount="indefinite" />
        <animate attributeName="y" values="58; 58; 58; 114; 114; 114; 170; 170; 170; 266; 266; 266; 322; 322; 322; 58" keyTimes="0; 0.08; 0.16; 0.161; 0.2; 0.29; 0.291; 0.33; 0.45; 0.451; 0.5; 0.62; 0.621; 0.66; 0.95; 1" dur="12s" repeatCount="indefinite" calcMode="discrete"/>
        <!-- Blink Effect -->
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" calcMode="discrete"/>
      </rect>
    </g>
  </g>
</svg>
